<svg width="800" height="250" viewBox="0 0 800 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-title {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      font-weight: 700;
      fill: #00F0FF;
      letter-spacing: 1.5px;
    }
    .card-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      fill: #cbd5e1;
    }
    .bold-text {
      font-weight: 600;
      fill: #3b82f6;
    }
    .border-glow {
      stroke: url(#about_gradient);
      stroke-width: 1.5px;
    }
  </style>
  
  <!-- Background Card -->
  <rect x="1" y="1" width="798" height="248" rx="8" fill="#09090b" class="border-glow"/>
  
  <!-- Title -->
  <text x="30" y="38" class="card-title">🚀 PROFILE OVERVIEW</text>
  
  <!-- Text Elements -->
  <text x="30" y="75" class="card-text">
    <tspan x="30" dy="0">🧠 <tspan class="bold-text">Problem Solving &amp; DSA</tspan> — Passionate about solving complex algorithmic challenges and optimizing computational complexity.</tspan>
    <tspan x="30" dy="28">💻 <tspan class="bold-text">Backend Engineering</tspan> — Building robust, scalable microservices, REST APIs, and event-driven systems using Java &amp; Spring Boot.</tspan>
    <tspan x="30" dy="28">🛡️ <tspan class="bold-text">Cyber Security Focus</tspan> — Exploring cryptography, security principles, secure backend development, and data protection.</tspan>
    <tspan x="30" dy="28">📐 <tspan class="bold-text">System Design &amp; Architecture</tspan> — Designing high-throughput, secure, and fault-tolerant cloud-native software ecosystems.</tspan>
    <tspan x="30" dy="28">🎯 <tspan class="bold-text">Professional Vision</tspan> — Aspiring to engineer state-of-the-art backend systems while driving efficiency through automated pipelines.</tspan>
  </text>
  
  <defs>
    <linearGradient id="about_gradient" x1="0" y1="0" x2="800" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#121214"/>
      <stop offset="100%" stop-color="#0055FF"/>
    </linearGradient>
  </defs>
</svg>
