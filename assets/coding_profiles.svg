<svg width="800" height="100" viewBox="0 0 800 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-bg {
      fill: #09090b;
      stroke: url(#profile_gradient);
      stroke-width: 1.5px;
    }
    .platform-title {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      font-weight: 700;
      fill: #ffffff;
    }
    .platform-link {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px;
      fill: #00F0FF;
    }
  </style>
  
  <!-- Background -->
  <rect x="1" y="1" width="798" height="98" rx="8" class="card-bg"/>
  
  <!-- LeetCode (Col 1: x = 80) -->
  <g transform="translate(80, 26)">
    <!-- Custom LeetCode Icon -->
    <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm-1.8 14.2l-2.4-2.4 5.6-5.6 1.4 1.4-4.6 4.6-1.4 2z" fill="#00F0FF"/>
    <text x="32" y="16" class="platform-title">LeetCode</text>
    <text x="32" y="32" class="platform-link">@karthikreddi00</text>
  </g>

  <!-- Codeforces (Col 2: x = 330) -->
  <g transform="translate(330, 26)">
    <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm1 14h-2v-4h2v4zm0-6h-2V7h2v3z" fill="#3b82f6"/>
    <text x="32" y="16" class="platform-title">Codeforces</text>
    <text x="32" y="32" class="platform-link">@karthikreddy00</text>
  </g>

  <!-- CodeChef (Col 3: x = 580) -->
  <g transform="translate(580, 26)">
    <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm2 10a2 2 0 1 1-4 0 2 2 0 0 1 4 0z" fill="#00F0FF"/>
    <text x="32" y="16" class="platform-title">CodeChef</text>
    <text x="32" y="32" class="platform-link">@klu_2300030338</text>
  </g>

  <defs>
    <linearGradient id="profile_gradient" x1="0" y1="0" x2="800" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#121214"/>
      <stop offset="100%" stop-color="#0055FF"/>
    </linearGradient>
  </defs>
