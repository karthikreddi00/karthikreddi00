<svg width="400" height="180" viewBox="0 0 400 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-title {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 15px;
      font-weight: 700;
      fill: #ffffff;
    }
    .card-desc {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 12px;
      fill: #94a3b8;
    }
    .tech-tag {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 10px;
      font-weight: 600;
    }
    .tag-bg {
      fill: #121214;
      stroke: #1f2937;
      stroke-width: 1px;
    }
    .border-glow {
      stroke: url(#card_gradient);
      stroke-width: 1.5px;
    }
  </style>
  
  <!-- Card Background -->
  <rect x="1" y="1" width="398" height="178" rx="8" fill="#09090b" class="border-glow"/>
  
  <!-- Project Title -->
  <text x="20" y="38" class="card-title">Virtual Stock Trading</text>
  
  <!-- Sleek Code/Terminal Icon on the top right -->
  <g transform="translate(360, 24) scale(0.8)">
    <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" fill="#a855f7" opacity="0.6"/>
  </g>
  
  <!-- Description -->
  <text x="20" y="66" class="card-desc">
    <tspan x="20" dy="0">An educational simulator recreating real stock</tspan>
    <tspan x="20" dy="18">transactions in a risk-free environment,</tspan>
    <tspan x="20" dy="18">integrated with automated CI/CD pipelines.</tspan>
  </text>
  
  <!-- Tech Tags -->
  <!-- Tag 1: Java -->
  <g transform="translate(20, 132)">
    <rect width="45" height="22" rx="4" class="tag-bg"/>
    <text x="22.5" y="14" text-anchor="middle" class="tech-tag" fill="#00f0ff">Java</text>
  </g>
  
  <!-- Tag 2: Spring Boot -->
  <g transform="translate(71, 132)">
    <rect width="84" height="22" rx="4" class="tag-bg"/>
    <text x="42" y="14" text-anchor="middle" class="tech-tag" fill="#a855f7">Spring Boot</text>
  </g>

  <!-- Tag 3: Hibernate -->
  <g transform="translate(161, 132)">
    <rect width="74" height="22" rx="4" class="tag-bg"/>
    <text x="37" y="14" text-anchor="middle" class="tech-tag" fill="#00f0ff">Hibernate</text>
  </g>

  <!-- Tag 4: Docker -->
  <g transform="translate(241, 132)">
    <rect width="54" height="22" rx="4" class="tag-bg"/>
    <text x="27" y="14" text-anchor="middle" class="tech-tag" fill="#a855f7">Docker</text>
  </g>

  <!-- Tag 5: Jenkins -->
  <g transform="translate(301, 132)">
    <rect width="58" height="22" rx="4" class="tag-bg"/>
    <text x="29" y="14" text-anchor="middle" class="tech-tag" fill="#00f0ff">Jenkins</text>
  </g>

  <defs>
    <linearGradient id="card_gradient" x1="0" y1="0" x2="400" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="35%" stop-color="#121214"/>
      <stop offset="65%" stop-color="#121214"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
  </defs>
</svg>
